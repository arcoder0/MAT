name: Exact Scheduled Task

on:
  schedule:
    - cron: '55 7 * * *'
    - cron: '15 8 * * *'
    - cron: '35 8 * * *'
    - cron: '55 8 * * *'
    - cron: '15 9 * * *'
    - cron: '35 9 * * *'
    - cron: '55 9 * * *'
    - cron: '15 10 * * *'
    - cron: '35 10 * * *'
    - cron: '55 10 * * *'
    - cron: '15 11 * * *'
    - cron: '35 11 * * *'
    - cron: '55 11 * * *'
    - cron: '15 12 * * *'
    - cron: '35 12 * * *'
    - cron: '55 12 * * *'
    - cron: '15 13 * * *'
    - cron: '35 13 * * *'
    - cron: '55 13 * * *'
    - cron: '15 14 * * *'
    - cron: '35 14 * * *'
    - cron: '55 14 * * *'
    - cron: '15 15 * * *'
    - cron: '35 15 * * *'
    - cron: '55 15 * * *'
    - cron: '15 16 * * *'
    - cron: '35 16 * * *'
    - cron: '55 16 * * *'
  workflow_dispatch:

jobs:
  run-exact:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run joiner script
        run: python src/script.py
        env:
          LICHESS_TOKENS: ${{ secrets.LICHESS_TOKENS }}
